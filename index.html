<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mahim Coding Todo</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background: linear-gradient(135deg,#1d2671,#c33764);
min-height:100vh;
}

.glass{
background: rgba(255,255,255,0.1);
backdrop-filter: blur(20px);
border:1px solid rgba(255,255,255,0.2);
}

.logoFont{
font-family:'Orbitron',sans-serif;
letter-spacing:3px;
color:#00F5FF;
}

.titleFont{
color:#F8FAFC;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar glass px-10 shadow-lg">

<div class="flex-1">
<a class="text-3xl font-bold logoFont">
MAHIM CODING
</a>
</div>

<div class="flex-none">
<ul class="menu menu-horizontal text-white font-semibold">
<li><a>Home</a></li>
<li><a>Projects</a></li>
<li><a>Contact</a></li>
</ul>
</div>

</div>


<!-- TODO CARD -->

<div class="flex justify-center items-center mt-20">

<div class="glass p-10 rounded-3xl shadow-2xl w-[500px]">

<h1 class="text-4xl font-bold text-center mb-8 titleFont">
My To-Do List
</h1>

<div class="flex gap-3 mb-6">

<input
id="inputEl"
type="text"
placeholder="Write your task..."
class="input input-bordered w-full"
/>

<button
id="addBtn"
class="btn btn-primary hover:scale-110 transition">
Add
</button>

</div>

<ul id="taskList" class="space-y-3"></ul>

</div>

</div>

<script src="script/script.js"></script>

</body>
</html>
